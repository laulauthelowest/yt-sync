name: Release Module

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in module.json
        run: |
          jq --arg v "${{ steps.get_version.outputs.VERSION }}" \
            '.version = $v' module.json > module.tmp.json
          mv module.tmp.json module.json

      - name: Build ZIP
        run: |
          zip -r yt-sync.zip \
            module.json \
            scripts/ \
            styles/ \
            lang/ \
            README.md

      - name: Commit updated module.json back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add module.json
          git commit -m "chore: bump version to ${{ steps.get_version.outputs.VERSION }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "YT Sync ${{ github.ref_name }}"
          body: |
            ## YT Sync ${{ github.ref_name }}

            ### Installation in Foundry VTT
            Manifest-URL in Foundry einfügen:
